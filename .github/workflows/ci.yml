name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.94.1
        run: rustup toolchain install 1.94.1 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo +1.94.1 fmt --check
      - name: Test
        run: cargo +1.94.1 test --locked
